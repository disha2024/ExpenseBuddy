<!DOCTYPE html>
<html>
<head>
    <title>Reset Password — ExpenseBuddy</title>
    <meta charset="UTF-8">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:linear-gradient(135deg,#1f1c2c,#928dab); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { background:white; padding:40px; border-radius:15px; box-shadow:0 10px 40px rgba(0,0,0,0.3); width:100%; max-width:420px; }
        h1 { text-align:center; color:#333; margin-bottom:8px; font-size:24px; }
        .subtitle { text-align:center; color:#888; font-size:13px; margin-bottom:25px; }
        .form-group { margin-bottom:18px; }
        label { display:block; color:#333; font-weight:bold; margin-bottom:8px; font-size:13px; text-transform:uppercase; letter-spacing:0.4px; }
        .pwd-wrap { position:relative; }
        .pwd-wrap input { width:100%; padding:12px 44px 12px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; transition:0.3s; color:#333; background:white; }
        .pwd-wrap input:focus { outline:none; border-color:#667eea; box-shadow:0 0 5px rgba(102,126,234,0.4); }
        .eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:16px; color:#888; padding:0; }
        .eye-btn:hover { color:#667eea; }
        .submit-btn { width:100%; padding:13px; background:linear-gradient(45deg,#667eea,#764ba2); color:white; border:none; border-radius:8px; font-weight:bold; font-size:16px; cursor:pointer; transition:0.3s; margin-top:5px; }
        .submit-btn:hover { transform:scale(1.02); box-shadow:0 5px 20px rgba(102,126,234,0.4); }
        .message { text-align:center; padding:12px; border-radius:8px; font-weight:bold; margin-bottom:16px; font-size:14px; }
        .error   { background:#f8d7da; color:#721c24; }
        .success { background:#d4edda; color:#155724; }
        .back-link { text-align:center; margin-top:18px; }
        .back-link a { color:#667eea; text-decoration:none; font-weight:bold; font-size:14px; }
        .back-link a:hover { text-decoration:underline; }
        .token-rules { background:#f0f0ff; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13px; color:#555; }
        .token-rules li { margin-left:16px; margin-bottom:4px; }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Reset Password</h1>
    <p class="subtitle">Enter your new password below</p>

    <div id="message"></div>

    <div id="resetForm">
        <ul class="token-rules">
            <li>Minimum 6 characters</li>
            <li>This link expires in 15 minutes</li>
            <li>Can only be used once</li>
        </ul>

        <div class="form-group">
            <label>New Password</label>
            <div class="pwd-wrap">
                <input type="password" id="newPassword" placeholder="Enter new password">
                <button class="eye-btn" type="button" onclick="togglePwd('newPassword', this)">👁️</button>
            </div>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <div class="pwd-wrap">
                <input type="password" id="confirmPassword" placeholder="Confirm new password">
                <button class="eye-btn" type="button" onclick="togglePwd('confirmPassword', this)">👁️</button>
            </div>
        </div>
        <button class="submit-btn" onclick="handleReset()">Reset Password</button>
    </div>

    <div class="back-link">
        <a href="/">← Back to Login</a>
    </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

// Extract token from URL
const urlParams  = new URLSearchParams(window.location.search);
const resetToken = urlParams.get("token");

// If no token in URL — show error immediately
if (!resetToken) {
    const msg = document.getElementById("message");
    msg.textContent = "❌ Invalid reset link. Please request a new one.";
    msg.className   = "message error";
    document.getElementById("resetForm").style.display = "none";
}

function togglePwd(id, btn) {
    const input     = document.getElementById(id);
    input.type      = input.type === "password" ? "text" : "password";
    btn.textContent = input.type === "password" ? "👁️" : "🙈";
}

async function handleReset() {
    const newPassword     = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const msgDiv          = document.getElementById("message");
    const btn             = document.querySelector(".submit-btn");

    // Validations
    if (!newPassword || !confirmPassword) {
        msgDiv.textContent = "Please fill in both fields";
        msgDiv.className   = "message error";
        return;
    }
    if (newPassword !== confirmPassword) {
        msgDiv.textContent = "Passwords do not match";
        msgDiv.className   = "message error";
        return;
    }
    if (newPassword.length < 6) {
        msgDiv.textContent = "Password must be at least 6 characters";
        msgDiv.className   = "message error";
        return;
    }

    try {
        // Disable button while processing
        btn.disabled = true;
        btn.textContent = "Processing...";

        const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                token: resetToken,
                password: newPassword
            })
        });

        const data = await res.json();

        if (res.ok) {
            msgDiv.textContent = "✅ " + data.message;
            msgDiv.className   = "message success";
            document.getElementById("resetForm").style.display = "none";

            // Redirect to login after 3 seconds
            setTimeout(() => window.location.href = "/", 3000);

        } else {
            msgDiv.textContent = "❌ " + (data.detail || "Reset failed");
            msgDiv.className   = "message error";

            // Handle expired / invalid token safely
            if (
                data.detail?.toLowerCase().includes("expired") ||
                data.detail?.toLowerCase().includes("invalid")
            ) {
                document.getElementById("resetForm").style.display = "none";
            }
        }

    } catch {
        msgDiv.textContent = "Server not reachable. Please try again.";
        msgDiv.className   = "message error";
    } finally {
        // Re-enable button
        btn.disabled = false;
        btn.textContent = "Reset Password";
    }
}
</script>
